name: FlowPay Selenium Web E2E Tests 400 Tests

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["FlowPay CI/CD Build and Deploy"]
    types: [completed]

env:
  BASE_URL: 'https://jananibsse.github.io/janani_pdd_flowpay/'
  PYTHON_VERSION: '3.11'
  RETENTION_DAYS: 30

permissions:
  contents: read
  actions: read

jobs:
  selenium-tests:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        run: |
          CHROME_FULL=$(google-chrome --version | grep -oP '[\d.]+')
          CHROME_MAJOR=$(echo $CHROME_FULL | cut -d. -f1)
          echo "Chrome: $CHROME_FULL (major $CHROME_MAJOR)"
          if [ "$CHROME_MAJOR" -ge 115 ]; then
            BASE="https://storage.googleapis.com/chrome-for-testing-public"
            DRIVER_URL="${BASE}/${CHROME_FULL}/linux64/chromedriver-linux64.zip"
            wget -q "$DRIVER_URL" -O /tmp/chromedriver.zip 2>/dev/null || true
          fi
          if [ ! -f /tmp/chromedriver.zip ] || [ ! -s /tmp/chromedriver.zip ]; then
            LATEST=$(wget -q -O- "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_${CHROME_MAJOR}" 2>/dev/null || echo "")
            if [ -n "$LATEST" ]; then
              wget -q "https://chromedriver.storage.googleapis.com/${LATEST}/chromedriver_linux64.zip" -O /tmp/chromedriver.zip
            fi
          fi
          if [ -f /tmp/chromedriver.zip ] && [ -s /tmp/chromedriver.zip ]; then
            cd /tmp && unzip -o chromedriver.zip -d /tmp/cdriver_extract
            find /tmp/cdriver_extract -name "chromedriver" -exec cp {} /usr/local/bin/chromedriver \;
            chmod +x /usr/local/bin/chromedriver
            echo "ChromeDriver installed: $(chromedriver --version)"
          else
            echo "Using selenium-manager fallback"
          fi

      - name: Install Python Dependencies
        run: |
          pip install selenium webdriver-manager pytest pytest-html \
            pytest-json-report pytest-rerunfailures pytest-timeout \
            pytest-xdist openpyxl jinja2 requests Pillow python-dotenv

      - name: Execute 400 Selenium Tests
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: 'true'
          SCREENSHOT_ON_FAILURE: 'true'
          WDM_LOG: '0'
        run: |
          cd automation/selenium
          mkdir -p reports/html reports/json reports/excel screenshots logs
          python -m pytest tests/ \
            --html=reports/html/selenium_report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=reports/json/selenium_results.json \
            -v --tb=short --timeout=120 \
            --reruns=1 --reruns-delay=3 \
            -p no:warnings \
            || true
        continue-on-error: true

      - name: Generate Excel Report
        if: always()
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          cd automation/selenium
          python3 gen_selenium_excel.py

      - name: Publish Summary
        if: always()
        run: |
          cd automation/selenium
          python3 gen_selenium_summary.py

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-HTML-Report
          path: automation/selenium/reports/html/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-Excel-Report
          path: automation/selenium/reports/excel/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-Screenshots
          path: automation/selenium/screenshots/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: ignore
