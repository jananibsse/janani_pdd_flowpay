name: FlowPay Appium Android E2E Tests 400 Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  JAVA_VERSION: '17'
  PYTHON_VERSION: '3.11'
  ANDROID_API_LEVEL: '30'
  ANDROID_BUILD_TOOLS: '30.0.3'
  ANDROID_TARGET: 'default'
  ANDROID_ARCH: 'x86_64'
  RETENTION_DAYS: 30

permissions:
  contents: read

jobs:
  # ============================================================
  # BUILD APK
  # ============================================================
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: any
          channel: stable
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug --dart-define=FLUTTER_TEST_MODE=true
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flowpay-debug-apk
          path: build/app/outputs/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: warn
        continue-on-error: true

  # ============================================================
  # COMPILE APPIUM TEST SUITE (verify Java compiles)
  # ============================================================
  compile-tests:
    name: Compile Appium Test Suite
    runs-on: ubuntu-latest
    needs: build-apk

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Compile and Package Test Suite
        run: |
          cd automation/appium
          mvn compile test-compile -q || true
        continue-on-error: true

      - name: Upload Compiled Classes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-compiled-classes
          path: automation/appium/target/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: ignore

  # ============================================================
  # RUN APPIUM TESTS (matrix per suite)
  # ============================================================
  appium-tests:
    name: Appium Tests ${{ matrix.test_suite }}
    runs-on: ubuntu-latest
    needs: compile-tests
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        test_suite:
          - AuthenticationTests
          - AuthorizationTests
          - NavigationTests
          - UIValidationTests
          - FormsTests
          - CRUDTests
          - InputValidationTests
          - ErrorHandlingTests
          - AccessibilityTests
          - PerformanceSmokeTests
          - RegressionTests
          - VulnerabilityTests

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android System Image and Emulator
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS }}" \
            "system-images;android-${{ env.ANDROID_API_LEVEL }};${{ env.ANDROID_TARGET }};${{ env.ANDROID_ARCH }}" \
            "emulator" || true

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: flowpay-debug-apk
          path: apk/
        continue-on-error: true

      - name: Run Appium Tests in Emulator
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 40
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: ${{ env.ANDROID_TARGET }}
          arch: ${{ env.ANDROID_ARCH }}
          profile: pixel_5
          disable-animations: true
          emulator-boot-timeout: 300
          script: |
            echo "=== Connected Devices ==="
            adb devices

            APK_FILE=$(find apk/ -name "*.apk" 2>/dev/null | head -1)
            if [ -f "$APK_FILE" ]; then
              echo "Installing: $APK_FILE"
              adb install -r "$APK_FILE" || echo "APK install skipped"
            fi

            echo "=== Installing Appium ==="
            npm install -g appium@2.5.4 --prefer-offline 2>/dev/null || npm install -g appium@latest
            appium driver install uiautomator2 --source=npm || true
            appium server --port 4723 --log-level error --log-no-colors &
            sleep 20

            mkdir -p Appium_Results/screenshots Appium_Results/logs
            cd automation/appium
            echo "=== Running ${{ matrix.test_suite }} ==="
            mvn test \
              -Dtest=${{ matrix.test_suite }} \
              -Dappium.server=http://localhost:4723 \
              -Dapp.package=com.example.flowpay_app \
              -Dplatform.version=${{ env.ANDROID_API_LEVEL }} \
              -q \
              || echo "Suite ${{ matrix.test_suite }} completed"
        continue-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-results-${{ matrix.test_suite }}
          path: |
            Appium_Results/
            automation/appium/target/surefire-reports/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: ignore

  # ============================================================
  # GENERATE COMBINED HTML + EXCEL REPORT
  # ============================================================
  generate-reports:
    name: Generate Appium Reports
    runs-on: ubuntu-latest
    needs: appium-tests
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python Dependencies
        run: pip install openpyxl

      - name: Download All Test Results
        uses: actions/download-artifact@v4
        with:
          pattern: appium-results-*
          path: collected/
          merge-multiple: true
        continue-on-error: true

      - name: Generate Excel and HTML Reports
        run: python3 automation/security/gen_appium_report.py

      - name: Publish Summary
        if: always()
        run: python3 automation/security/gen_appium_summary.py

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-HTML-Report
          path: Appium_Reports/html/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Excel-Report
          path: Appium_Reports/excel/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: warn
