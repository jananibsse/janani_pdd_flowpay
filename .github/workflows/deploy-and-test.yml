name: FlowPay CI/CD Build and Deploy

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override BASE_URL for tests'
        required: false
        default: 'https://jananibsse.github.io/janani_pdd_flowpay/'

env:
  BASE_URL: ${{ github.event.inputs.base_url || 'https://jananibsse.github.io/janani_pdd_flowpay/' }}
  FLUTTER_VERSION: 'any'
  RETENTION_DAYS: 30

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  # ============================================================
  # STAGE 1-4: BUILD & STATIC ANALYSIS
  # ============================================================
  build:
    name: Stage 1-4 Build and Static Analysis
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build_status.outputs.status }}
      commit_sha: ${{ github.sha }}
      build_number: ${{ github.run_number }}

    steps:
      - name: Stage 1 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stage 2 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Stage 2b Install Dependencies
        run: flutter pub get

      - name: Stage 4 Static Analysis (Flutter Analyze)
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Stage 4b Flutter Unit Tests
        run: flutter test --coverage

      - name: Stage 3 Build Flutter Web
        run: |
          flutter build web --release \
            --base-href="/janani_pdd_flowpay/" \
            --dart-define=FLUTTER_WEB_AUTO_DETECT=true

      - name: Set Build Status
        id: build_status
        run: echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/
          retention-days: ${{ env.RETENTION_DAYS }}

  # ============================================================
  # STAGE 5: DEPLOY TO GITHUB PAGES
  # ============================================================
  deploy:
    name: Stage 5 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/

      - name: Stage 5 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages

  # ============================================================
  # STAGE 6-7: VERIFY DEPLOYMENT
  # ============================================================
  verify-deployment:
    name: Stage 6-7 Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for Propagation
        run: sleep 30

      - name: Verify Deployment
        run: |
          BASE_URL="${{ env.BASE_URL }}"
          for i in $(seq 1 5); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL" || echo "000")
            echo "Attempt $i/5 - HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Deployment verified!"
              exit 0
            fi
            sleep 15
          done
          echo "Deployment may still be propagating"

      - name: Publish Build Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # FlowPay Build and Deploy Summary

          | Field | Value |
          |-------|-------|
          | **Build** | #${{ github.run_number }} |
          | **Branch** | `${{ github.ref_name }}` |
          | **Commit** | `${{ github.sha }}` |
          | **URL** | [${{ env.BASE_URL }}](${{ env.BASE_URL }}) |

          > Testing is performed by dedicated workflows:
          > - **Selenium E2E** - `selenium-e2e.yml`
          > - **Appium E2E** - `appium-e2e.yml`
          > - **Vulnerability** - `vulnerability-testing.yml`
          > - **Load Testing** - `load-testing.yml`
          EOF
