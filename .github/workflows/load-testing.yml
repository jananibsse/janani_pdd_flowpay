name: FlowPay Load and Performance Testing 400 Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  BASE_URL: 'https://jananibsse.github.io/janani_pdd_flowpay/'
  PYTHON_VERSION: '3.11'
  RETENTION_DAYS: 30

permissions:
  contents: read

jobs:
  load-tests:
    name: Execute Load and Performance Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python Dependencies
        run: |
          pip install pytest pytest-html pytest-json-report pytest-timeout openpyxl requests

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Run k6 Baseline Load Test
        run: |
          mkdir -p LoadTest_Results/k6 LoadTest_Results/html LoadTest_Results/json LoadTest_Results/excel
          k6 run \
            --out json=LoadTest_Results/k6/baseline-raw.json \
            --summary-export=LoadTest_Results/k6/baseline-summary.json \
            -e BASE_URL=${{ env.BASE_URL }} \
            automation/security/k6-load-test.js \
            || true
        continue-on-error: true

      - name: Run 400 Load Test Assertions
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          python -m pytest automation/security/test_load_analysis.py \
            -c automation/security/pytest.ini \
            --html=LoadTest_Results/html/loadtest_report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=LoadTest_Results/json/loadtest_results.json \
            -v \
            --tb=short \
            --timeout=30 \
            -p no:warnings \
            || true
        continue-on-error: true

      - name: Generate Excel Report
        if: always()
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: python3 automation/security/gen_load_excel.py

      - name: Publish Summary
        if: always()
        run: python3 automation/security/gen_load_summary.py

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: LoadTest-HTML-Report
          path: LoadTest_Results/html/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: LoadTest-Excel-Report
          path: LoadTest_Results/excel/
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: warn
